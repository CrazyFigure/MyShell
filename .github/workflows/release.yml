name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      # 使用 tauri-action 当前公开主版本 v0；上游没有 v1 tag，错误版本会在任务初始化阶段直接失败。
      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MyShell ${{ github.ref_name }}
          releaseBody: Windows EXE installer is attached below.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          # 使用 action.yml 支持的资产命名参数，让 Release 附件名称稳定可识别。
          assetNamePattern: MyShell_[version]_[platform]_[arch][setup][ext]
